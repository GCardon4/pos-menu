server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Health check para Coolify / Docker
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
        access_log off;
    }

    # Hash router mode: todo se resuelve desde index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agresivo para assets estáticos con hash en el nombre
    location ~* \.(js|css|woff|woff2|ttf|eot|ico|svg|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Compresión gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;
}
